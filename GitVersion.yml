mode: ContinuousDeployment
branches:
  main:
    regex: ^main$
    mode: ContinuousDeployment
    tag: ''
    increment: Patch
    prevent-increment-of-merged-branch-version: true
    track-merge-target: false
    is-release-branch: true
  feature:
    regex: ^feature[/-]
    mode: ContinuousDeployment
    tag: alpha
    increment: Inherit
  pull-request:
    regex: ^(pull|pull\-requests|pr)[/-]
    mode: ContinuousDeployment
    tag: PullRequest
    increment: Inherit
  hotfix:
    regex: ^hotfix[/-]
    mode: ContinuousDeployment
    tag: beta
    increment: Patch
  release:
    regex: ^release[/-]
    mode: ContinuousDeployment
    tag: rc
    increment: None
    is-release-branch: true
ignore:
  sha: []
