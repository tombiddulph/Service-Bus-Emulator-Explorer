name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.1.1
        with:
          versionSpec: '5.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.1.1
        with:
          useConfigFile: true

  build-and-test:
    runs-on: ubuntu-latest
    needs: version
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/sb-explorer-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/sb-explorer-ui
        run: npm ci

      - name: Build frontend
        working-directory: app/sb-explorer-ui
        run: npm run build

      - name: Restore .NET dependencies
        run: dotnet restore -r linux-musl-x64

      - name: Build .NET solution
        run: |
          dotnet build --no-restore --configuration Release \
            -p:Version=${{ needs.version.outputs.majorMinorPatch }} \
            -p:AssemblyVersion=${{ needs.version.outputs.majorMinorPatch }}.0 \
            -p:FileVersion=${{ needs.version.outputs.majorMinorPatch }}.0 \
            -p:InformationalVersion=${{ needs.version.outputs.semVer }}

      - name: Run tests
        run: dotnet run --project test/ServiceBusEmulatorExplorer.Tests/ServiceBusEmulatorExplorer.Tests.csproj --configuration Release

  release:
    runs-on: ubuntu-latest
    needs: [version, build-and-test]
    permissions:
      contents: write
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: image
        run: echo "name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ServiceBusEmulatorExplorer/Dockerfile
          push: true
          build-args: |
            VERSION=${{ needs.version.outputs.semVer }}
            ASSEMBLY_VERSION=${{ needs.version.outputs.majorMinorPatch }}.0
          tags: |
            ${{ steps.image.outputs.name }}:${{ needs.version.outputs.semVer }}
            ${{ steps.image.outputs.name }}:${{ needs.version.outputs.majorMinorPatch }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.semVer }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: v${{ needs.version.outputs.semVer }}
          body: |
            ## Docker Image
            
            ```bash
            docker pull ${{ steps.image.outputs.name }}:${{ needs.version.outputs.semVer }}
            ```
